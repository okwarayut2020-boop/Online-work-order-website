<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ส่งงาน - ระบบสั่งงานออนไลน์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main-pink: #f48fb1; 
            --soft-purple: #f3e5f5; 
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%); 
        }
        
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh; margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
        }

        .send-card { 
            background: rgba(255, 255, 255, 0.8); 
            border-radius: 30px; padding: 40px; 
            width: 100%; max-width: 600px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { color: #5e35b1; margin-bottom: 30px; font-size: 2em; }

        .input-group { display: flex; align-items: center; margin-bottom: 15px; background: white; border-radius: 15px; padding: 5px 15px; }
        .input-group label { width: 120px; text-align: left; color: #666; font-size: 0.9em; }
        .input-group input, .input-group select { 
            flex: 1; border: none; padding: 12px; font-family: 'Sarabun'; outline: none; background: transparent;
        }

        /* ส่วนแนบไฟล์ */
        .file-upload { display: flex; align-items: center; background: white; border-radius: 15px; padding: 5px 15px; margin-bottom: 25px; }
        .file-upload label { width: 120px; text-align: left; color: #666; font-size: 0.9em; }
        .file-custom { flex: 1; text-align: left; color: #999; font-size: 0.9em; }
        .btn-attach { background: #b39ddb; color: white; border: none; padding: 8px 20px; border-radius: 12px; cursor: pointer; }

        .btn-row { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-confirm { background: var(--main-pink); color: white; border: none; padding: 12px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(244,143,177,0.4); }
        .btn-back { background: #eee; color: #666; border: none; padding: 12px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        #previewArea { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid white; }
    </style>
</head>
<body>

<div class="send-card">
    <h1>ส่งงาน</h1>
    
    <div class="input-group">
        <label>รหัสนักศึกษา</label>
        <input type="text" id="stdID" readonly>
    </div>
    <div class="input-group">
        <label>ชื่อ-สกุล</label>
        <input type="text" id="stdName" placeholder="กรอกชื่อ-นามสกุล">
    </div>
    <div class="input-group">
        <label>ระดับชั้น</label>
        <select id="classLevel">
            <option value="">เลือกกระดับชั้น</option>
            <option value="ม.1">ม.1</option>
            <option value="ม.2">ม.2</option>
            <option value="ม.3">ม.3</option>
            <option value="ม.4">ม.4</option>
            <option value="ม.5">ม.5</option>
            <option value="ม.6">ม.6</option>
        </select>
    </div>
    <div class="input-group">
        <label>เลขที่</label>
        <input type="number" id="stdNo" placeholder="กรอกเลขที่">
    </div>

    <div class="file-upload">
        <label>ไฟล์งาน</label>
        <div class="file-custom" id="fileNameDisp">แนบไฟล์</div>
        <input type="file" id="fileInput" hidden multiple onchange="handleFiles(this)">
        <button class="btn-attach" onclick="document.getElementById('fileInput').click()">แนบไฟล์</button>
    </div>

    <div id="previewArea"></div>

    <div class="btn-row">
        <button class="btn-confirm" onclick="submitWork()">ยืนยันการส่งงาน</button>
        <button class="btn-back" onclick="window.location.href='detail.html'">ย้อนกลับ</button>
    </div>
</div>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxB6wBp9YqJ_nkwM3ufxLoNPDhiBePu-7I79doawsd48aa_us3AlX0S-P0p_jvdQh0h/exec"; // ⚠️ อย่าลืมเปลี่ยน URL ตรงนี้

    let uploadedImages = [];

    window.onload = function() {
        document.getElementById("stdID").value = localStorage.getItem("studentID") || "";
        document.getElementById("stdName").value = localStorage.getItem("userName") || "";
        document.getElementById("classLevel").value = localStorage.getItem("myClass") || "";
    }

    function handleFiles(input) {
        const files = input.files;
        uploadedImages = [];
        document.getElementById("previewArea").innerHTML = "";
        document.getElementById("fileNameDisp").innerText = files.length + " ไฟล์ที่เลือก";

        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                uploadedImages.push(e.target.result);
                const img = document.createElement("img");
                img.src = e.target.result;
                img.className = "preview-img";
                document.getElementById("previewArea").appendChild(img);
            };
            reader.readAsDataURL(file);
        });
    }

    async function submitWork() {
    const btn = document.querySelector(".btn-confirm");
    
    // ตรวจสอบข้อมูลเบื้องต้น
    if (uploadedImages.length === 0) {
        alert("❌ กรุณาแนบรูปภาพก่อนครับ");
        return;
    }

    btn.innerText = "⏳ กำลังบันทึกงาน...";
    btn.disabled = true;

    const payload = {
        type: 'submit_assignment',
        studentID: document.getElementById("stdID").value,
        studentName: document.getElementById("stdName").value,
        classLevel: document.getElementById("classLevel").value,
        stdNo: document.getElementById("stdNo").value,
        jobId: localStorage.getItem("activeJobId") || "N/A",
        vicha: localStorage.getItem("activeVicha") || "ทั่วไป",
        fileLink: uploadedImages[0]
    };

    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        
        // ถ้าส่งสำเร็จ
        alert("✅ บันทึกงานเรียบร้อยแล้ว!");
        window.location.href = "history.html";

    } catch (error) {
        // กรณี Error แต่บางทีข้อมูลเข้าแล้ว (CORS Issue)
        console.log("Network error but checking success...");
        alert("ส่งงานเสร็จสิ้น!"); 
        window.location.href = "history.html";
    } finally {
        btn.innerText = "ยืนยันการส่งงาน";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
